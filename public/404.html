<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages has no server-side rewrites, so a deep link (e.g. a
      // reloaded /read/<id> URL) 404s. This is the standard spa-github-pages
      // redirect trick: encode the real path into a query string pointing at
      // the app's index.html, which restores it via history.replaceState.
      var pathSegmentsToKeep = 1 // keep the "/<repo-name>" segment
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
